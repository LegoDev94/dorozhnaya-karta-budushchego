  <style>
    html, body { font-family: 'Inter', sans-serif; background: #060912; color: #E5E7EB; }
    .font-display { font-family: 'Manrope', sans-serif; }

    .grain { background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px); background-size: 3px 3px; }

    /* Deep-space backdrop — nebulae, no flat dashboard feel */
    .space-bg {
      background:
        radial-gradient(ellipse at 50% 120%, rgba(124, 58, 237, 0.16), transparent 55%),
        radial-gradient(ellipse at 12% 8%, rgba(45, 212, 191, 0.07), transparent 45%),
        radial-gradient(ellipse at 88% 14%, rgba(251, 191, 36, 0.06), transparent 45%),
        #060912;
    }

    .glass {
      background: rgba(17, 24, 41, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .node-btn { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .node-wrapper { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .node-wrapper:hover { transform: translate(-50%, -50%) scale(1.17) !important; z-index: 40; }
    .node-wrapper:hover .node-btn { filter: brightness(1.18); }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, 0.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 0.5); }

    @keyframes ringPulse { 0% { transform: scale(1); opacity: 0.65; } 100% { transform: scale(2.3); opacity: 0; } }
    .ring-pulse { animation: ringPulse 3s ease-out infinite; }

    @keyframes auraPulse { 0%, 100% { opacity: 0.55; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.06); } }
    .aura-pulse { animation: auraPulse 5s ease-in-out infinite; }

    @keyframes driftSlow { 0%,100% { transform: translate(0,0); } 50% { transform: translate(0,-6px); } }
    .drift { animation: driftSlow 9s ease-in-out infinite; }

    /* Живой поток времени вдоль выбранной орбиты */
    @keyframes dashFlow { to { stroke-dashoffset: -24; } }
    .orbit-flow { animation: dashFlow 2.6s linear infinite; }

    /* Медленный дрейф космического фона — ощущение текучести */
    @keyframes bgDrift { 0%,100% { transform: scale(1.06) translate(0,0); } 50% { transform: scale(1.06) translate(0,-1.2%); } }
    .bg-drift { animation: bgDrift 22s ease-in-out infinite; }

    /* Круговые гравитационные ряби вокруг точки А */
    @keyframes waveRing { 0% { transform: scale(0.28); opacity: 0.6; } 78% { opacity: 0.12; } 100% { transform: scale(1.7); opacity: 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Мерцание звёзд */
    @keyframes twinkle { 0%,100% { opacity: 0.12; } 50% { opacity: 0.9; } }

    /* Аккреция: частицы по спирали затягиваются в ядро */
    @keyframes accrete {
      0%   { transform: rotate(var(--a)) translateX(var(--r)) scale(1); opacity: 0; }
      14%  { opacity: 0.85; }
      100% { transform: rotate(calc(var(--a) + 65deg)) translateX(5px) scale(0.2); opacity: 0; }
    }

    /* Кинематографический вход карты */
    @keyframes introRise { from { opacity: 0; transform: translateY(16px) scale(0.985); } to { opacity: 1; transform: none; } }
    .intro-rise { animation: introRise 1s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* Орбиты прочерчиваются от точки А наружу */
    @keyframes drawIn { from { stroke-dashoffset: 1; } to { stroke-dashoffset: 0; } }
    @keyframes fadeInLate { from { opacity: 0; } to { opacity: 1; } }

    /* Сюжетный «облёт»: подсвеченный узел и появление подписи */
    @keyframes captionIn { from { opacity: 0; transform: translate(-50%, 6px); } to { opacity: 1; transform: translate(-50%, 0); } }

    /* Адаптивный масштаб фигуры-хаба под размер карты (translate оставляем для параллакса) */
    .hub-scale { transform: translate(-50%, -50%) scale(1); }

    @media (max-width: 640px)  { .hub-scale { transform: translate(-50%, -50%) scale(0.58); } }

    /* Тонкий скроллбар для сайдбаров на ПК */
    .thin-scroll::-webkit-scrollbar { width: 6px; }
    .thin-scroll::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.25); border-radius: 3px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-overlay { animation: fadeIn 0.2s ease-out; }
    .modal-content { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

    .node-tooltip {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s ease; z-index: 30;
    }
    .node-wrapper:hover .node-tooltip { opacity: 1; }

    /* ========== ГЕОМЕТРИЯ ПРОСТРАНСТВА-ВРЕМЕНИ ==========
       Хаб = "точка А" (настоящее). Орбиты расходятся ВВЕРХ (будущее).
       Гравитационные поля прошлого — НИЖЕ хаба. Радиус орбиты = интенсивность перехода. */
    const HUB = { x: 50, y: 76 };            // якорь орбит (геометрия путей)
    const CORE = { x: 49, y: 80 };           // центр ядра чёрной дыры (фигура + кольца стоят здесь)

    // Контрольные точки основы — общий горизонт 2–3 года (итоговый продукт.txt)
    const HORIZONS = ['7 дней', '30 дней', '3 месяца', '6 месяцев', '1 год', '2–3 года'];

    // угол узла i вдоль дуги орбиты (над хабом). Плотность времени: ближе к точке А (начало пути)
    // время «гуще» — ранние контрольные точки сжаты; к горизонту 2–3 года растянуты (время ускоряется).
    const orbitAngle = (i) => 205 + 130 * Math.pow(i / (HORIZONS.length - 1), 1.42); // 205°..335°
    const nodePos = (orbit, i) => {
      const a = (orbitAngle(i) * Math.PI) / 180;
      return { x: HUB.x + orbit.rx * Math.cos(a), y: HUB.y + orbit.ry * Math.sin(a) };
    };

    /* Три сценария будущего ОСНОВЫ = три орбиты по интенсивности перехода.
       Внутри каждой — роль-ветвь и узлы на контрольных точках. (Chto_poluchit п.3.7) */

          { kind: 'role', label: 'Новая идентичность', desc: 'Новая профессиональная и жизненная идентичность собрана.', tasks: ['Авторская позиция', 'Модель дохода новой роли', 'Устойчивый ритм'] },

    /* Прошлое как поле притяжения — гравитационные силы, тянущие назад (философия, блок 4).
       Деликатно, без болезненных ярлыков (этика основы). */
    const GRAVITY_FIELDS = [
      { label: 'Привычная роль', pos: { x: 27, y: 92 }, r: 15 },
      { label: 'Страх перемен', pos: { x: 50, y: 96 }, r: 17 },
      { label: 'Обязательства', pos: { x: 73, y: 92 }, r: 15 },
    ];

    /* Гравитация искривляет пространство-время: точка притягивается к полям прошлого.
       Чем дальше орбита от полей (смелее сценарий) — тем меньше прогиб: «прорыв» вырывается из притяжения. */
    const warpPoint = (p) => {
      let dx = 0, dy = 0;
      for (const g of GRAVITY_FIELDS) {
        const ex = g.pos.x - p.x, ey = g.pos.y - p.y;
        const dist = Math.hypot(ex, ey) + 0.001;
        const pull = (g.r * 8.5) / (dist + 9);       // «масса» поля ~ радиус, falloff с расстоянием
        dx += (ex / dist) * pull;
        dy += (ey / dist) * pull;
      }
      dx = Math.max(-7, Math.min(7, dx));
      dy = Math.max(-2, Math.min(12, dy));           // поля внизу — тянут преимущественно вниз
      return { x: p.x + dx, y: p.y + dy };

      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || p2;
        const c1x = p1.x + (p2.x - p0.x) / 6, c1y = p1.y + (p2.y - p0.y) / 6;
        const c2x = p2.x - (p3.x - p1.x) / 6, c2y = p2.y - (p3.y - p1.y) / 6;

          <div className="flex-1 min-w-0">
            <div className="text-[10px] uppercase tracking-wider opacity-50 mb-1.5 hidden sm:block">Горизонт движения · 2–3 года</div>
            <div className="relative flex items-center justify-between">
              <div className="absolute left-0 right-0 top-1/2 h-px bg-white/10" />
              <div className="absolute left-0 top-1/2 h-px bg-gradient-to-r from-emerald-400 to-teal-400" style={{ width: '40%' }} />
              {MILESTONES.map((m, i) => (
                <div key={i} className="relative flex flex-col items-center gap-1 z-10">
                  <div className={`w-3 h-3 rounded-full border-2 ${m.status === 'done' ? 'bg-emerald-400 border-emerald-400' : m.status === 'active' ? 'bg-teal-400 border-teal-400 ring-4 ring-teal-400/20' : 'bg-night-800 border-white/25'}`} />
                  <span className={`text-[10px] ${m.status === 'upcoming' ? 'opacity-50' : ''}`}>{m.horizon}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="flex items-center justify-between lg:justify-end gap-3 lg:gap-5 lg:border-l lg:border-white/10 lg:pl-5">
            {KEY_INDICATORS.map((m, i) => (
              <div key={i} className="text-center">
                <div className="flex items-center gap-1 justify-center opacity-60"><Icon name={m.icon} className="w-3 h-3" /><span className="text-[9px] uppercase tracking-wide hidden xl:inline">{m.label}</span></div>
                <div className={`font-display font-bold text-base leading-tight ${m.tone === 'positive' ? 'text-teal-300' : ''}`}>{m.value}</div>
              </div>
            ))}
          </div>
        </div>
        <p className="text-[10px] opacity-40 text-center mt-2 leading-snug">Карта помогает выбирать, но не выбирает за вас. Не прогноз и не диагноз. <a href="./landing.html" className="underline hover:text-white/60">о проекте</a></p>
      </Card>
    );

    /* ========== APP ========== */
    const App = () => {
      const [selected, setSelected] = useState('growth');
      const [selectedNode, setSelectedNode] = useState(null);
      const scenario = SCENARIOS.find(s => s.id === selected) || SCENARIOS[0];

      // присвоить статусы узлам выбранного сценария (демо-прогресс)
      const withStatus = (node, i) => {
        if (i < 2) return { ...node, status: 'done' };
        if (i === 2) return { ...node, status: 'active' };
        return { ...node, status: 'upcoming' };
      };
      // подмешать статусы во все сценарии для рендера
      SCENARIOS.forEach(s => s.nodes = s.nodes.map((n, i) => ({ ...n, status: withStatus(n, i).status })));

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') setSelectedNode(null); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      return (
        <div className="min-h-screen lg:h-screen lg:overflow-hidden flex flex-col space-bg text-white grain">
          <Header />
          <main className="flex-1 min-h-0 flex flex-col lg:flex-row gap-3 px-3 md:px-4 pb-3 overflow-y-auto lg:overflow-hidden">
            <LeftSidebar />
            <div className="order-1 lg:order-2 flex-1 min-w-0 flex flex-col min-h-0 gap-2">
              <ScenarioMap selected={selected} setSelected={setSelected} onNodeClick={setSelectedNode} />
              <BottomStrip />
            </div>
            <RightSidebar scenario={scenario} />
          </main>

          <NodeModal data={selectedNode} onClose={() => setSelectedNode(null)} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
