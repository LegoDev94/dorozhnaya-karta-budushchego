<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дорожная карта будущего — Life Design</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Inter','system-ui','sans-serif'], display: ['Manrope','Inter','sans-serif'] },
        colors: { night: { 900:'#070B14', 800:'#0C1220', 700:'#131B2C', 600:'#1B2438' } },
        boxShadow: {
          'glow-teal':'0 0 22px rgba(45,212,191,0.40)',
          'glow-violet':'0 0 22px rgba(167,139,250,0.45)',
          'glow-amber':'0 0 24px rgba(251,191,36,0.45)',
        },
      }},
    };
  </script>
  <style>
    html, body { font-family:'Inter',sans-serif; background:#070B14; color:#E5E7EB; margin:0; }
    .font-display { font-family:'Manrope',sans-serif; }
    .grain { background-image: radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px); background-size:3px 3px; }
    .glass { background: rgba(12,18,32,0.55); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border:1px solid rgba(255,255,255,0.07); }
    .glass-strong { background: rgba(12,18,32,0.82); backdrop-filter: blur(16px); border:1px solid rgba(255,255,255,0.10); }
    ::-webkit-scrollbar { width:7px; height:7px; }
    ::-webkit-scrollbar-thumb { background:rgba(100,116,139,0.28); border-radius:4px; }
    .thin-scroll::-webkit-scrollbar { width:6px; }
    .thin-scroll::-webkit-scrollbar-thumb { background:rgba(100,116,139,0.22); border-radius:3px; }

    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(18px) scale(.97)} to{opacity:1;transform:none} }
    .modal-overlay { animation: fadeIn .2s ease-out; }
    .modal-content { animation: slideUp .3s cubic-bezier(.16,1,.3,1); }
    @keyframes dashFlow { to { stroke-dashoffset: -28; } }
    .path-flow { animation: dashFlow 2.8s linear infinite; }
    @keyframes ringPulse { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(2.2);opacity:0} }
    .ring-pulse { animation: ringPulse 2.6s ease-out infinite; }
    @keyframes auraPulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:.85;transform:scale(1.06)} }
    .aura-pulse { animation: auraPulse 5s ease-in-out infinite; }
    @keyframes waveShift { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .wave-anim { animation: waveShift 7s linear infinite; }
    @keyframes introUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
    .intro-up { animation: introUp .8s cubic-bezier(.16,1,.3,1) both; }
    .hub-scale { transform: translate(-50%, -50%) scale(1); }
    @media (max-width:1280px){ .hub-scale{ transform:translate(-50%,-50%) scale(.85);} }
    @media (max-width:640px){ .hub-scale{ transform:translate(-50%,-50%) scale(.62);} }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="grain">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    /* ========== ICONS ========== */
    const Icon = ({ name, className = "w-5 h-5", stroke = 1.8 }) => {
      const p = {
        compass: <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>,
        check: <polyline points="20 6 9 17 4 12"/>,
        lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
        star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
        users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
        trending: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
        target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
        compassRole: <><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></>,
        anchor: <><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></>,
        heart: <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>,
        book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>,
        sparkle: <path d="M12 3l1.9 5.6L20 10l-5.5 1.6L12 17l-1.9-5.6L4 10l5.6-1.6L12 3z"/>,
        globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
        zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
        focus: <><circle cx="12" cy="12" r="3"/><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></>,
        brain: <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2z"/>,
        money: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
        flask: <><path d="M9 3h6"/><path d="M10 3v6.5L4.5 18a2 2 0 0 0 1.7 3h11.6a2 2 0 0 0 1.7-3L14 9.5V3"/><line x1="7" y1="15" x2="17" y2="15"/></>,
        horizon: <><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18"/></>,
        close: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        chevron: <polyline points="9 18 15 12 9 6"/>,
        chevronL: <polyline points="15 18 9 12 15 6"/>,
        bell: <><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
        clipboard: <><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></>,
        grid: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
        message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
        user: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        map: <><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></>,
        arrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
      };
      return (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{p[name] || p.compass}</svg>);
    };

    /* ========== ДАННЫЕ ========== */
    const HORIZONS = ['7 дней', '30 дней', '3 месяца', '6 месяцев', '1 год', '2–3 года'];
    const PNR = '#FB923C';
    const FIG = { x: 50, y: 72 };
    const PNR_NODE = 'pnr', PROTO = 'prototype';

    const SCENARIOS = [
      { id:'careful', title:'Бережный', orbitName:'Безопасная орбита', tagline:'Развитие без резких разрушений',
        roleOutcome:'Усиление текущей роли эксперта', fit:'если высоки риски и нужна устойчивость',
        accent:'#2DD4BF', preview:'preview-careful.png', dest:{x:15,y:17}, ctrl:{x:20,y:46},
        nodes:[
          {kind:'step',label:'Аудит опоры',desc:'Что уже работает и что важно сохранить при изменениях.',tasks:['Карта ресурсов','Что нельзя терять','Зоны усталости']},
          {kind:'step',label:'Уточнение роли',desc:'Усилить текущую экспертную роль, а не ломать её.',tasks:['«Кому я полезен»','Доказательства экспертизы','Язык о себе']},
          {kind:'prototype',label:'Упаковка опыта',desc:'Оформить экспертизу в видимую форму — мини-проверка спроса.',tasks:['Экспертный пост','Мини-услуга','3 разговора']},
          {kind:'step',label:'Первая монетизация',desc:'Аккуратно повысить чек или добавить услугу.',tasks:['Гипотеза цены','Пробное предложение','Сверка устойчивости']},
          {kind:'step',label:'Устойчивая практика',desc:'Стабильный поток без перегрузки.',tasks:['Ритм нагрузки','Регулярные клиенты','Контроль энергии']},
          {kind:'role',label:'Признанный эксперт',desc:'Новая роль закреплена без потери опоры.',tasks:['Позиционирование','Сообщество','Следующий цикл']},
        ]},
      { id:'growth', title:'Рост', orbitName:'Орбита роста', tagline:'Усиление роли, дохода и влияния',
        roleOutcome:'Эксперт → предприниматель / руководитель', fit:'если есть ресурс и амбиция',
        accent:'#A78BFA', preview:'preview-growth.png', dest:{x:50,y:8}, ctrl:{x:47,y:40},
        nodes:[
          {kind:'step',label:'Карта ресурсов',desc:'Активы и амбиция: на что опереться в рывке.',tasks:['Опыт и связи','Готовность к риску','Точка отсчёта']},
          {kind:'step',label:'Гипотеза дохода',desc:'Новая модель монетизации опыта.',tasks:['Кому ценность','Формат продукта','Ориентиры']},
          {kind:'prototype',label:'Запуск направления',desc:'Малая безопасная проверка новой модели.',tasks:['MVP за 2 недели','Прямые продажи','Обратная связь']},
          {kind:'step',label:'Первые клиенты',desc:'Подтверждение спроса на новую модель.',tasks:['10 платящих','Кейсы','Уточнение оффера']},
          {kind:'pnr',label:'Система и команда',desc:'Перевод в систему — после этого назад к «соло» не вернуться.',tasks:['Процессы','Первый найм','Делегирование']},
          {kind:'role',label:'Масштаб и влияние',desc:'Устойчивый рост роли, дохода и позиционирования.',tasks:['Каналы','Линейка продуктов','Публичность']},
        ]},
      { id:'breakthrough', title:'Пересборка', orbitName:'Орбита прорыва', tagline:'Новая ниша и идентичность',
        roleOutcome:'Смелая ценностная траектория', fit:'если старая модель исчерпана',
        accent:'#FBBF24', preview:'preview-breakthrough.png', dest:{x:85,y:17}, ctrl:{x:80,y:46},
        nodes:[
          {kind:'step',label:'Честный разговор',desc:'Что исчерпано и больше не продолжается по-старому.',tasks:['Что завершилось','Цена старого','Что зовёт']},
          {kind:'step',label:'Образ новой роли',desc:'Кем становлюсь, опираясь на зрелые ценности.',tasks:['Новая идентичность','Ценностная формула','Допустимое будущее']},
          {kind:'prototype',label:'Прототип новой жизни',desc:'7-дневный эксперимент нового образа жизни.',tasks:['7-дн тест','Пробная консультация','Новая среда']},
          {kind:'pnr',label:'Выход из старой роли',desc:'Горизонт событий: старый сценарий не продолжить. Момент пересборки.',tasks:['Завершить прежнее','Объяснить среде','Удержать границы']},
          {kind:'step',label:'Новая ниша и среда',desc:'Закрепиться в новом пространстве возможностей.',tasks:['Войти в среду','Первые результаты','Связи']},
          {kind:'role',label:'Новая идентичность',desc:'Новая профессиональная и жизненная идентичность собрана.',tasks:['Авторская позиция','Модель дохода','Ритм']},
        ]},
    ];
    const byId = (id) => SCENARIOS.find(s => s.id === id) || SCENARIOS[1];

    const NAV = [
      { id:'map', label:'Карта', icon:'map', active:true }, { id:'profile', label:'Профиль', icon:'user' },
      { id:'journal', label:'Дневник', icon:'book' }, { id:'resources', label:'Ресурсы', icon:'grid' },
      { id:'mentor', label:'Ментор', icon:'message' },
    ];
    const USER = { name:'Мария Ковалёва', role:'Эксперт · точка перехода' };
    const STAGES = [
      { id:1, name:'Диагностика' }, { id:2, name:'Ценности' }, { id:3, name:'Идентичность' },
      { id:4, name:'Сценарии' }, { id:5, name:'Дорожная карта' }, { id:6, name:'Сопровождение' },
    ];
    const LIFE_SPACES = [
      { key:'energy', label:'Энергия', icon:'zap' }, { key:'focus', label:'Фокус', icon:'focus' },
      { key:'skills', label:'Навыки', icon:'brain' }, { key:'env', label:'Окружение', icon:'users' },
      { key:'finance', label:'Деньги', icon:'money' },
    ];
    const VALUE_ICONS = { 'Свобода':'compass','Развитие':'trending','Достоинство':'star','Влияние':'sparkle','Творчество':'sparkle','Опора':'anchor','Семья':'heart','Знания':'book','Служение':'heart' };
    const ALL_VALUES = ['Свобода','Развитие','Достоинство','Влияние','Творчество','Опора','Семья','Знания','Служение'];

    const QUESTIONS = [
      { id:'state', q:'Что точнее про вашу ситуацию сейчас?', opts:[
        { label:'Всё в целом работает — хочу аккуратно усилить', s:{careful:2,growth:1,breakthrough:0} },
        { label:'Прежняя роль стала тесной — хочу расти', s:{careful:0,growth:2,breakthrough:1} },
        { label:'Старая модель исчерпана — нужна пересборка', s:{careful:0,growth:1,breakthrough:2} },
      ]},
      { id:'risk', q:'Готовность к риску и переменам?', opts:[
        { label:'Низкая — важна устойчивость', s:{careful:2,growth:0,breakthrough:0} },
        { label:'Средняя — готов(а) к расчётному риску', s:{careful:0,growth:2,breakthrough:1} },
        { label:'Высокая — готов(а) к смелым шагам', s:{careful:0,growth:1,breakthrough:2} },
      ]},
      { id:'energy', q:'Сколько у вас сейчас энергии и ресурса?', opts:[
        { label:'Мало — берегу силы', s:{careful:2,growth:0,breakthrough:0} },
        { label:'Достаточно для рывка', s:{careful:0,growth:2,breakthrough:1} },
        { label:'Много — хочу масштаба', s:{careful:0,growth:1,breakthrough:2} },
      ]},
      { id:'income', q:'Что важнее в деньгах на 2–3 года?', opts:[
        { label:'Стабильность дохода', s:{careful:2,growth:0,breakthrough:0} },
        { label:'Заметный рост дохода', s:{careful:0,growth:2,breakthrough:0} },
        { label:'Новая модель дохода', s:{careful:0,growth:0,breakthrough:2} },
      ]},
      { id:'horizon', q:'Каким видите себя через 2–3 года?', opts:[
        { label:'Признанный эксперт в своём деле', s:{careful:2,growth:1,breakthrough:0} },
        { label:'Предприниматель / руководитель', s:{careful:0,growth:2,breakthrough:1} },
        { label:'В новой нише и новой роли', s:{careful:0,growth:0,breakthrough:2} },
      ]},
    ];

    function computeResult(picks, values) {
      const sc = { careful:0, growth:0, breakthrough:0 };
      picks.forEach(p => { if (p) for (const k in p.s) sc[k] += p.s[k]; });
      const total = (sc.careful + sc.growth + sc.breakthrough) || 1;
      const match = { careful: Math.round(sc.careful/total*100), growth: Math.round(sc.growth/total*100), breakthrough: Math.round(sc.breakthrough/total*100) };
      const recommended = ['breakthrough','growth','careful'].reduce((a,b)=> sc[b] > sc[a] ? b : a, 'careful');
      const readiness = Math.min(94, Math.max(38, Math.round(45 + sc.growth*4 + sc.breakthrough*6 - sc.careful*2)));
      const spaces = {
        energy: Math.min(95, 50 + (sc.growth+sc.breakthrough)*3), focus: Math.min(92, 52 + sc.growth*3),
        skills: 68, env: Math.max(40, 60 - sc.breakthrough*2), finance: Math.min(90, 50 + sc.growth*4),
      };
      return { match, recommended, readiness, values: (values && values.length ? values : ['Свобода','Развитие','Опора']), spaces, ts: Date.now() };
    }

    const bez = (a, c, b, t) => { const u = 1 - t; return { x: u*u*a.x + 2*u*t*c.x + t*t*b.x, y: u*u*a.y + 2*u*t*c.y + t*t*b.y }; };
    const pathD = (s) => `M ${FIG.x} ${FIG.y} Q ${s.ctrl.x} ${s.ctrl.y} ${s.dest.x} ${s.dest.y}`;
    const nodeT = (i) => 0.18 + 0.80 * Math.pow(i / (HORIZONS.length - 1), 1.12);
    const nodePos = (s, i) => bez(FIG, s.ctrl, s.dest, nodeT(i));
    const withStatus = (n, i) => i < 2 ? {...n,status:'done'} : i === 2 ? {...n,status:'active'} : {...n,status:'upcoming'};

    /* ========== БАЗОВЫЙ UI ========== */
    const Card = ({ children, className='' }) => (<div className={`rounded-2xl glass ${className}`}>{children}</div>);
    const CardTitle = ({ children, icon }) => (
      <div className="flex items-center gap-2 mb-3"><Icon name={icon} className="w-3.5 h-3.5 opacity-50" /><div className="font-display font-semibold text-[11px] uppercase tracking-wider opacity-70">{children}</div></div>
    );
    const Gauge = ({ value, size=96, stroke=8, label='Готовность' }) => {
      const r = (size-stroke)/2, c = 2*Math.PI*r, off = c - (value/100)*c;
      return (
        <div className="relative" style={{ width:size, height:size }}>
          <svg width={size} height={size} className="-rotate-90">
            <circle cx={size/2} cy={size/2} r={r} stroke="#1A2335" strokeWidth={stroke} fill="none"/>
            <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#2DD4BF"/><stop offset="100%" stopColor="#A78BFA"/></linearGradient></defs>
            <circle cx={size/2} cy={size/2} r={r} stroke="url(#gg)" strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" fill="none" style={{transition:'stroke-dashoffset 1s ease'}}/>
          </svg>
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <div className="font-display font-bold text-xl">{value}%</div>
            <div className="text-[9px] uppercase tracking-wider opacity-55 text-center leading-tight px-2">{label}</div>
          </div>
        </div>
      );
    };
    const Bar = ({ value, label, icon }) => (
      <div className="flex items-center gap-2.5">
        <Icon name={icon} className="w-3.5 h-3.5 opacity-60 shrink-0" />
        <div className="flex-1">
          <div className="flex justify-between mb-1"><span className="text-[12px]">{label}</span><span className="text-[12px] font-semibold tabular-nums opacity-80">{value}%</span></div>
          <div className="h-1.5 rounded-full overflow-hidden bg-white/8"><div className="h-full rounded-full bg-gradient-to-r from-teal-400 to-violet-500" style={{width:`${value}%`,transition:'width 1s ease'}}/></div>
        </div>
      </div>
    );

    /* ========== ВЕРХНЯЯ ПАНЕЛЬ ========== */
    const TopBar = ({ onQuiz }) => (
      <header className="flex items-center justify-between px-4 md:px-5 py-2.5 shrink-0 border-b border-white/5">
        <div className="flex items-center gap-2.5">
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-teal-500 to-violet-600 flex items-center justify-center text-white shadow-glow-violet"><Icon name="compass" className="w-5 h-5" stroke={2}/></div>
          <div className="leading-tight"><div className="font-display font-bold text-[15px]">LIFE DESIGN</div><div className="text-[9px] uppercase tracking-[0.2em] opacity-50">Дорожная карта</div></div>
        </div>
        <nav className="hidden lg:flex items-center gap-1 glass rounded-full px-1.5 py-1">
          {NAV.map(n => (
            <button key={n.id} disabled={!n.active} title={n.active ? '' : 'Скоро'}
              className={`flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-[12px] font-medium transition ${n.active ? 'bg-gradient-to-r from-teal-500/80 to-violet-600/80 text-white' : 'opacity-55 hover:opacity-80'}`}>
              <Icon name={n.icon} className="w-3.5 h-3.5"/><span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="flex items-center gap-3">
          <button onClick={onQuiz} className="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[12px] font-semibold bg-white/8 hover:bg-white/14 transition"><Icon name="clipboard" className="w-3.5 h-3.5"/>Анкета</button>
          <button className="w-9 h-9 rounded-full relative flex items-center justify-center bg-white/5 hover:bg-white/10"><Icon name="bell" className="w-4 h-4"/><span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-teal-400"/></button>
          <div className="flex items-center gap-2.5">
            <div className="hidden sm:block text-right leading-tight"><div className="font-semibold text-[13px]">{USER.name}</div><div className="text-[10px] opacity-55">{USER.role}</div></div>
            <div className="w-9 h-9 rounded-full bg-gradient-to-br from-teal-400 to-violet-500 flex items-center justify-center text-white font-bold font-display">{USER.name[0]}</div>
          </div>
        </div>
      </header>
    );

    /* ========== ЛЕВАЯ ПАНЕЛЬ ========== */
    const Waveform = () => (
      <div className="h-12 overflow-hidden rounded-lg bg-white/5 relative">
        <svg className="absolute inset-0 w-[200%] h-full wave-anim" viewBox="0 0 200 48" preserveAspectRatio="none">
          <defs><linearGradient id="wv" x1="0" x2="1"><stop offset="0%" stopColor="#2DD4BF"/><stop offset="50%" stopColor="#A78BFA"/><stop offset="100%" stopColor="#2DD4BF"/></linearGradient></defs>
          <path d="M0 24 Q 12 6 25 24 T 50 24 T 75 24 T 100 24 T 125 24 T 150 24 T 175 24 T 200 24" fill="none" stroke="url(#wv)" strokeWidth="2" opacity="0.9"/>
        </svg>
      </div>
    );
    const LeftPanel = ({ result, onQuiz }) => {
      const sp = result ? result.spaces : { energy:64, focus:58, skills:70, env:52, finance:60 };
      const vals = result ? result.values : ['Свобода','Развитие','Достоинство','Знания','Опора'];
      const readiness = result ? result.readiness : 48;
      const stability = result ? Math.min(90, 55 + Math.round((100-result.match.breakthrough)/5)) : 72;
      return (
        <aside className="w-full lg:w-64 shrink-0 order-2 lg:order-1 lg:min-h-0 lg:overflow-y-auto thin-scroll lg:pr-1">
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3">
            <Card className="p-4">
              <CardTitle icon="target">Ваш путь</CardTitle>
              <div className="flex items-center gap-3 mb-3">
                <Gauge value={readiness} label="Прогресс пути"/>
                <div className="text-[12px] opacity-75 leading-snug">{result ? `Рекомендованная траектория: ${byId(result.recommended).title}.` : 'Заполните анкету, чтобы построить персональную траекторию.'}</div>
              </div>
              <button onClick={onQuiz} className="w-full py-2 rounded-lg text-[12px] font-semibold text-white bg-gradient-to-r from-teal-500 to-violet-600 hover:opacity-90 transition flex items-center justify-center gap-1.5"><Icon name="clipboard" className="w-3.5 h-3.5"/>{result ? 'Обновить путь' : 'Заполнить анкету'}</button>
            </Card>
            <Card className="p-4"><CardTitle icon="focus">Текущий статус</CardTitle><div className="space-y-2.5">{LIFE_SPACES.map(m => <Bar key={m.key} label={m.label} icon={m.icon} value={sp[m.key]}/>)}</div></Card>
            <Card className="p-4"><CardTitle icon="heart">Ценности</CardTitle><div className="flex flex-wrap gap-2">{vals.map(v => (<span key={v} className="flex items-center gap-1.5 text-xs px-2.5 py-1.5 rounded-lg bg-teal-500/12 text-teal-200"><Icon name={VALUE_ICONS[v]||'star'} className="w-3 h-3"/>{v}</span>))}</div></Card>
            <Card className="p-4"><CardTitle icon="zap">Энергия жизни</CardTitle><Waveform/><div className="mt-3"><Bar label="Устойчивость" icon="anchor" value={stability}/></div></Card>
          </div>
        </aside>
      );
    };

    /* ========== КАРТА ========== */
    const NODE_ICON = (n) => n.kind===PNR_NODE ? 'horizon' : n.kind===PROTO ? 'flask' : n.kind==='role' ? 'compassRole' : (n.status==='done' ? 'check' : 'star');
    const MapNode = ({ node, pos, accent, dim, onClick }) => {
      const up = node.status==='upcoming', active = node.status==='active', pnr = node.kind===PNR_NODE;
      const c = pnr ? PNR : accent;
      return (
        <div className="absolute" style={{ left:`${pos.x}%`, top:`${pos.y}%`, transform:'translate(-50%,-50%)', opacity: dim?0.55:1, transition:'opacity .3s', zIndex: active?20:10 }}>
          <button onClick={onClick} className="relative flex items-center justify-center transition-transform duration-200 hover:scale-110"
            style={{ width: pnr?34:28, height: pnr?34:28, borderRadius: pnr?8:9999, transform: pnr?'rotate(45deg)':'none',
                     background: up ? 'rgba(255,255,255,0.10)' : `linear-gradient(135deg,${c},${c}cc)`,
                     border: active ? '2px solid #fff' : '1.5px solid rgba(255,255,255,0.5)',
                     boxShadow: active ? `0 0 20px ${c}` : up ? '0 2px 8px rgba(0,0,0,0.5)' : `0 4px 12px ${c}66`,
                     color: up ? 'rgba(255,255,255,0.65)' : '#fff' }}>
            <span style={{ transform: pnr?'rotate(-45deg)':'none', display:'flex' }}><Icon name={up ? 'lock' : NODE_ICON(node)} className="w-3.5 h-3.5" stroke={2.3}/></span>
            {active && !pnr && <span className="absolute inset-0 rounded-full ring-pulse" style={{ border:`2px solid ${accent}` }}/>}
          </button>
        </div>
      );
    };
    const DestinationCard = ({ s, selected, recommended, match, onClick }) => (
      <button onClick={onClick} className="absolute text-left transition-transform duration-300"
        style={{ left:`${s.dest.x}%`, top:`${s.dest.y}%`, transform:`translate(-50%,-50%) scale(${selected?1.04:1})`, zIndex: selected?30:15, width:168 }}>
        <div className="rounded-xl overflow-hidden glass-strong" style={{ borderColor: selected ? s.accent : 'rgba(255,255,255,0.12)', boxShadow: selected ? `0 0 26px ${s.accent}66` : '0 8px 24px rgba(0,0,0,0.5)' }}>
          <div className="relative h-16">
            <img src={`./assets/${s.preview}`} alt="" className="w-full h-full object-cover"/>
            <div className="absolute inset-0" style={{ background:'linear-gradient(to top, rgba(12,18,32,0.96), transparent 72%)' }}/>
            {recommended && <div className="absolute top-1.5 left-1.5 text-[8px] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded text-night-900" style={{ background:s.accent }}>Рекомендовано</div>}
            {match!=null && <div className="absolute top-1.5 right-1.5 text-[10px] font-bold px-1.5 py-0.5 rounded bg-black/55" style={{ color:s.accent }}>{match}%</div>}
          </div>
          <div className="px-2.5 py-2">
            <div className="text-[9px] uppercase tracking-wider" style={{ color:s.accent }}>{s.orbitName}</div>
            <div className="font-display font-bold text-sm leading-tight">{s.title}</div>
            <div className="text-[10px] opacity-65 leading-tight mt-0.5">{s.tagline}</div>
          </div>
        </div>
      </button>
    );
    const Figure = () => (
      <div className="absolute pointer-events-none hub-scale" style={{ left:`${FIG.x}%`, top:`${FIG.y}%` }}>
        <div className="relative" style={{ width:140, height:150 }}>
          <div className="absolute inset-0 aura-pulse" style={{ background:'radial-gradient(circle at 50% 55%, rgba(167,139,250,0.45), rgba(45,212,191,0.12) 40%, transparent 65%)' }}/>
          <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2" style={{ width:88, height:130 }}>
            <img src="./assets/figure-light.png" alt="Вы здесь" draggable="false" style={{ width:'100%', height:'100%', objectFit:'contain', objectPosition:'center bottom', filter:'drop-shadow(0 0 16px rgba(167,139,250,0.55))' }}/>
          </div>
          <div className="absolute left-1/2 -translate-x-1/2" style={{ top:'calc(50% + 66px)' }}>
            <div className="px-3 py-1 rounded-full text-[11px] font-display font-bold bg-black/55 backdrop-blur text-white border border-white/15 whitespace-nowrap">Вы здесь · Настоящее</div>
          </div>
        </div>
      </div>
    );

    const RoadMap = ({ selected, setSelected, result, onNodeClick }) => (
      <div className="flex-1 flex flex-col min-h-0">
        <div className="flex flex-wrap items-center justify-between gap-x-4 gap-y-2 mb-2 shrink-0">
          <div className="min-w-0">
            <h1 className="font-display font-bold text-lg md:text-xl leading-tight">Ваш путь · выберите направление</h1>
            <p className="text-[11px] opacity-55 hidden md:block leading-tight">Три траектории расходятся из точки А. {result ? 'Анкета подсветила рекомендованную.' : 'Пройдите анкету — построим персональную.'}</p>
          </div>
          <div className="flex gap-2 flex-wrap">
            {SCENARIOS.map(s => (
              <button key={s.id} onClick={()=>setSelected(s.id)} className={`px-2.5 py-1.5 rounded-lg border transition flex items-center gap-2 ${selected===s.id?'scale-[1.03]':'opacity-70 hover:opacity-100'}`}
                style={{ background:`${s.accent}1f`, borderColor: selected===s.id?s.accent:`${s.accent}55`, boxShadow: selected===s.id?`0 0 16px ${s.accent}55`:'none' }}>
                <span className="w-2 h-2 rounded-full" style={{ background:s.accent }}/><span className="font-display font-bold text-[13px]" style={{ color:s.accent }}>{s.title}</span>
              </button>
            ))}
          </div>
        </div>

        <div className="relative rounded-2xl overflow-hidden border border-white/5 intro-up min-h-[340px] sm:min-h-[420px] lg:min-h-0 lg:flex-1 bg-night-900">
          <img src="./assets/terrain.png" alt="" className="absolute inset-0 w-full h-full object-cover" style={{ objectPosition:'center 35%' }}/>
          <div className="absolute inset-0 pointer-events-none" style={{ background:'linear-gradient(to bottom, rgba(7,11,20,0.55) 0%, rgba(7,11,20,0.05) 30%, rgba(7,11,20,0) 55%, rgba(7,11,20,0.45) 100%)' }}/>
          <div className="absolute top-2.5 left-1/2 -translate-x-1/2 text-[10px] uppercase tracking-[0.2em] text-white/45 pointer-events-none" style={{ textShadow:'0 1px 6px #000' }}>Будущее · поле возможностей</div>

          <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>{SCENARIOS.map(s => (<linearGradient key={s.id} id={`g-${s.id}`} x1="0" x2="1" y1="1" y2="0"><stop offset="0%" stopColor={s.accent} stopOpacity="0.25"/><stop offset="100%" stopColor={s.accent} stopOpacity="1"/></linearGradient>))}</defs>
            {SCENARIOS.map(s => { const sel = selected===s.id; const d = pathD(s); return (
              <g key={s.id}>
                <path d={d} fill="none" stroke={s.accent} strokeOpacity={sel?0.55:0.18} strokeWidth={sel?1.3:0.8} strokeLinecap="round" style={{ filter:`drop-shadow(0 0 ${sel?2.5:1.5}px ${s.accent})` }}/>
                <path d={d} fill="none" stroke={`url(#g-${s.id})`} strokeWidth={sel?0.55:0.35} strokeLinecap="round" strokeDasharray="1.4 1.3" className={sel?'path-flow':''}/>
              </g>
            );})}
          </svg>

          {SCENARIOS.map(s => s.nodes.map((n,i) => { const node = {...withStatus(n,i), horizon:HORIZONS[i]}; return (
            <MapNode key={`${s.id}-${i}`} node={node} pos={nodePos(s,i)} accent={s.accent} dim={selected!==s.id} onClick={()=>onNodeClick({ ...node, scenario:s })}/>
          );}))}

          {SCENARIOS.map(s => (
            <DestinationCard key={s.id} s={s} selected={selected===s.id} recommended={result && result.recommended===s.id} match={result ? result.match[s.id] : null} onClick={()=>setSelected(s.id)}/>
          ))}

          <Figure/>
        </div>

        <div className="shrink-0 mt-2 hidden sm:flex items-center justify-between glass rounded-xl px-3 py-2">
          {STAGES.map((st,i) => { const done = i<3, active = i===3; return (
            <React.Fragment key={st.id}>
              <div className="flex items-center gap-2">
                <span className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold ${done?'bg-teal-500/25 text-teal-300':active?'bg-gradient-to-br from-teal-500 to-violet-600 text-white':'bg-white/8 text-white/40'}`}>{done?<Icon name="check" className="w-3 h-3" stroke={3}/>:st.id}</span>
                <span className={`text-[11px] font-medium hidden md:inline ${active?'text-white':done?'text-teal-300':'opacity-45'}`}>{st.name}</span>
              </div>
              {i<STAGES.length-1 && <div className={`flex-1 h-px mx-1 ${done?'bg-teal-400/40':'bg-white/10'}`}/>}
            </React.Fragment>
          );})}
        </div>
      </div>
    );

    /* ========== ПРАВАЯ ПАНЕЛЬ ========== */
    const RightPanel = ({ selected, result }) => {
      const s = byId(selected);
      const nodes = s.nodes.map((n,i)=>({...withStatus(n,i),horizon:HORIZONS[i]}));
      const active = nodes.find(n=>n.status==='active') || nodes[2];
      const done = nodes.filter(n=>n.status==='done');
      const rec = result ? byId(result.recommended) : null;
      return (
        <aside className="w-full lg:w-72 shrink-0 order-3 lg:min-h-0 lg:overflow-y-auto thin-scroll lg:pl-1">
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-3">
            <Card className="p-4">
              <CardTitle icon="target">Текущий фокус</CardTitle>
              <div className="text-[10px] uppercase tracking-wider mb-1" style={{ color:s.accent }}>{s.orbitName} · {active.horizon}</div>
              <div className="font-semibold text-[15px] mb-1">{active.label}</div>
              <p className="text-[11px] opacity-65 leading-snug mb-3">{active.desc}</p>
              <div className="space-y-1.5 mb-3">{active.tasks.map((t,i)=>(<div key={i} className="flex items-center gap-2 text-[12px]"><span className="w-4 h-4 rounded-full border-2 shrink-0" style={{ borderColor:s.accent }}/>{t}</div>))}</div>
              <button className="w-full py-2 rounded-lg text-white font-semibold text-[12px] hover:opacity-90 transition" style={{ background:`linear-gradient(135deg,${s.accent},${s.accent}dd)` }}>Перейти к шагу</button>
            </Card>
            <Card className="p-4">
              <CardTitle icon="check">Недавнее</CardTitle>
              <div className="space-y-2">
                {done.map((n,i)=>(<div key={i} className="flex items-center gap-2 text-[12px]"><span className="w-4 h-4 rounded-full bg-emerald-500 text-white flex items-center justify-center shrink-0"><Icon name="check" className="w-2.5 h-2.5" stroke={3}/></span><span className="opacity-80">Пройдено: {n.label}</span></div>))}
                <div className="flex items-center gap-2 text-[12px] opacity-55"><span className="w-4 h-4 rounded-full border border-white/25 shrink-0"/>Заполнена диагностика</div>
              </div>
            </Card>
            <Card className="p-4">
              <CardTitle icon="trending">Инсайт траектории</CardTitle>
              {result ? (
                <>
                  <div className="text-[11px] opacity-65 mb-1">Вы движетесь к</div>
                  <div className="font-display font-bold text-base mb-2" style={{ color:rec.accent }}>{rec.title} · {rec.orbitName}</div>
                  <div className="flex justify-between text-[11px] mb-1"><span className="opacity-70">Соответствие</span><span className="font-semibold" style={{ color:rec.accent }}>{result.match[result.recommended]}%</span></div>
                  <div className="h-2 rounded-full overflow-hidden bg-white/8 mb-3"><div className="h-full rounded-full" style={{ width:`${result.match[result.recommended]}%`, background:`linear-gradient(to right,${rec.accent},#ffffff88)` }}/></div>
                  <p className="text-[11px] opacity-65 leading-snug">{rec.roleOutcome}. Подходит, {rec.fit}.</p>
                </>
              ) : (<p className="text-[12px] opacity-65 leading-snug">Пройдите анкету — и здесь появится ваша рекомендованная траектория с оценкой соответствия.</p>)}
            </Card>
          </div>
        </aside>
      );
    };

    /* ========== МОДАЛКА УЗЛА ========== */
    const NodeModal = ({ data, onClose }) => {
      if (!data) return null;
      const s = data.scenario, pnr = data.kind===PNR_NODE, proto = data.kind===PROTO;
      const done = data.status==='done', active = data.status==='active', up = data.status==='upcoming';
      const accent = pnr ? PNR : s.accent;
      return (
        <div onClick={onClose} className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" style={{ background:'rgba(7,11,20,0.72)', backdropFilter:'blur(8px)' }}>
          <div onClick={e=>e.stopPropagation()} className="modal-content w-full max-w-md rounded-3xl p-6 relative bg-night-800 border border-white/10 text-white">
            <button onClick={onClose} className="absolute top-4 right-4 w-9 h-9 rounded-full flex items-center justify-center hover:bg-white/10"><Icon name="close" className="w-4 h-4"/></button>
            <div className="flex items-start gap-4 mb-4">
              <div className="w-14 h-14 flex items-center justify-center shrink-0 text-white" style={{ background:`linear-gradient(135deg,${accent},${accent}dd)`, borderRadius: pnr?12:16, boxShadow:`0 8px 24px ${accent}55` }}><Icon name={pnr?'horizon':proto?'flask':data.kind==='role'?'compassRole':'star'} className="w-6 h-6"/></div>
              <div className="flex-1 pt-1">
                <div className="text-[10px] uppercase tracking-wider opacity-70 font-semibold" style={{ color:s.accent }}>{s.orbitName} · {data.horizon}</div>
                <h3 className="font-display font-bold text-xl leading-tight">{data.label}</h3>
                <div className="mt-1.5">
                  {done && <span className="text-[11px] px-2 py-0.5 rounded-full bg-emerald-500/15 text-emerald-400 font-semibold">Пройдено</span>}
                  {active && <span className="text-[11px] px-2 py-0.5 rounded-full font-semibold" style={{ background:`${accent}22`, color:accent }}>Текущий шаг</span>}
                  {pnr && <span className="text-[11px] px-2 py-0.5 rounded-full font-semibold bg-orange-500/15 text-orange-300">Точка невозврата</span>}
                  {proto && !pnr && <span className="text-[11px] px-2 py-0.5 rounded-full font-semibold bg-amber-500/15 text-amber-300">Прототип</span>}
                </div>
              </div>
            </div>
            <p className="text-sm opacity-80 leading-relaxed mb-4">{data.desc}</p>
            {pnr && <div className="mb-4 p-3 rounded-xl bg-orange-500/10 border border-orange-500/20 text-[13px] text-orange-200 leading-relaxed">Горизонт событий: после этого решения старый сценарий уже не продолжить. Это не катастрофа, а момент пересборки.</div>}
            <div className="mb-4">
              <div className="text-[10px] uppercase tracking-wider opacity-60 font-semibold mb-2">Шаги</div>
              <div className="space-y-2">{data.tasks.map((t,i)=>(<div key={i} className="flex items-center gap-3 p-2.5 rounded-xl bg-white/5"><div className={`w-5 h-5 rounded-full flex items-center justify-center shrink-0 ${done?'bg-emerald-500 text-white':'border-2'}`} style={!done?{borderColor:accent}:{}}>{done && <Icon name="check" className="w-3 h-3" stroke={3}/>}</div><span className="text-sm">{t}</span></div>))}</div>
            </div>
            {active && <button className="w-full py-3 rounded-xl text-white font-semibold text-sm hover:opacity-90 transition" style={{ background:`linear-gradient(135deg,${accent},${accent}dd)` }}>Отметить шаг выполненным</button>}
            {up && <div className="p-3 rounded-xl text-xs text-center bg-white/5 text-white/70">Откроется после прохождения предыдущих контрольных точек</div>}
            {done && <button className="w-full py-3 rounded-xl font-semibold text-sm bg-white/5 hover:bg-white/10">Открыть разбор шага</button>}
            <p className="text-[11px] opacity-45 mt-3 leading-relaxed text-center">Это рекомендация и опора для решения, а не гарантия. Выбор остаётся за вами.</p>
          </div>
        </div>
      );
    };

    /* ========== АНКЕТА ========== */
    const Questionnaire = ({ onClose, onComplete }) => {
      const total = QUESTIONS.length + 1;
      const [step, setStep] = useState(0);
      const [picks, setPicks] = useState(Array(QUESTIONS.length).fill(null));
      const [values, setValues] = useState([]);
      const isValues = step === QUESTIONS.length;
      const canNext = isValues ? values.length > 0 : picks[step] != null;
      const choose = (opt) => { const pp = picks.slice(); pp[step] = opt; setPicks(pp); setTimeout(()=>setStep(s=>Math.min(s+1, total-1)), 180); };
      const toggleVal = (v) => setValues(vs => vs.includes(v) ? vs.filter(x=>x!==v) : (vs.length<3 ? [...vs,v] : vs));
      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 modal-overlay" style={{ background:'rgba(7,11,20,0.8)', backdropFilter:'blur(10px)' }}>
          <div className="modal-content w-full max-w-lg rounded-3xl p-6 md:p-7 relative bg-night-800 border border-white/10 text-white">
            <button onClick={onClose} className="absolute top-4 right-4 w-9 h-9 rounded-full flex items-center justify-center hover:bg-white/10"><Icon name="close" className="w-4 h-4"/></button>
            <div className="text-[10px] uppercase tracking-wider opacity-55 mb-1">Анкета · шаг {step+1} из {total}</div>
            <div className="h-1.5 rounded-full bg-white/8 overflow-hidden mb-5"><div className="h-full rounded-full bg-gradient-to-r from-teal-400 to-violet-500" style={{ width:`${(step+1)/total*100}%`, transition:'width .3s' }}/></div>
            {!isValues ? (
              <>
                <h3 className="font-display font-bold text-xl leading-tight mb-5">{QUESTIONS[step].q}</h3>
                <div className="space-y-2.5">
                  {QUESTIONS[step].opts.map((o,i) => { const sel = picks[step]===o; return (
                    <button key={i} onClick={()=>choose(o)} className={`w-full text-left px-4 py-3 rounded-xl border transition flex items-center gap-3 ${sel?'border-teal-400 bg-teal-500/10':'border-white/10 hover:border-white/25 hover:bg-white/5'}`}>
                      <span className={`w-5 h-5 rounded-full border-2 shrink-0 flex items-center justify-center ${sel?'border-teal-400 bg-teal-400 text-night-900':'border-white/30'}`}>{sel && <Icon name="check" className="w-3 h-3" stroke={3}/>}</span>
                      <span className="text-sm">{o.label}</span>
                    </button>
                  );})}
                </div>
              </>
            ) : (
              <>
                <h3 className="font-display font-bold text-xl leading-tight mb-1">Выберите до 3 ценностей-опор</h3>
                <p className="text-[12px] opacity-60 mb-4">На что хотите опираться в движении ({values.length}/3).</p>
                <div className="flex flex-wrap gap-2">
                  {ALL_VALUES.map(v => { const sel = values.includes(v); return (
                    <button key={v} onClick={()=>toggleVal(v)} className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm border transition ${sel?'border-teal-400 bg-teal-500/15 text-teal-200':'border-white/10 hover:border-white/25'}`}><Icon name={VALUE_ICONS[v]||'star'} className="w-3.5 h-3.5"/>{v}</button>
                  );})}
                </div>
              </>
            )}
            <div className="flex items-center justify-between mt-6">
              <button onClick={()=>step>0 ? setStep(step-1) : onClose()} className="flex items-center gap-1.5 text-sm opacity-70 hover:opacity-100 transition"><Icon name="chevronL" className="w-4 h-4"/>{step>0?'Назад':'Отмена'}</button>
              {isValues
                ? <button onClick={()=>canNext && onComplete(computeResult(picks, values))} disabled={!canNext} className={`px-5 py-2.5 rounded-xl font-semibold text-sm transition ${canNext?'bg-gradient-to-r from-teal-500 to-violet-600 text-white hover:opacity-90':'bg-white/8 text-white/40'}`}>Построить путь</button>
                : <button onClick={()=>canNext && setStep(step+1)} disabled={!canNext} className={`flex items-center gap-1.5 px-5 py-2.5 rounded-xl font-semibold text-sm transition ${canNext?'bg-white/10 hover:bg-white/16':'bg-white/5 text-white/40'}`}>Далее<Icon name="chevron" className="w-4 h-4"/></button>}
            </div>
          </div>
        </div>
      );
    };

    /* ========== APP ========== */
    const STORE = 'lifedesign_result_v1';
    const App = () => {
      const [result, setResult] = useState(null);
      const [selected, setSelected] = useState('growth');
      const [node, setNode] = useState(null);
      const [quiz, setQuiz] = useState(false);
      useEffect(() => {
        try { const r = JSON.parse(localStorage.getItem(STORE) || 'null'); if (r) { setResult(r); setSelected(r.recommended); } else { setQuiz(true); } } catch (e) {}
        const k = (e)=>{ if(e.key==='Escape'){ setNode(null); setQuiz(false); } };
        window.addEventListener('keydown', k); return ()=>window.removeEventListener('keydown', k);
      }, []);
      const onComplete = (r) => { setResult(r); setSelected(r.recommended); setQuiz(false); try { localStorage.setItem(STORE, JSON.stringify(r)); } catch(e){} };
      return (
        <div className="min-h-screen lg:h-screen lg:overflow-hidden flex flex-col text-white grain bg-night-900">
          <TopBar onQuiz={()=>setQuiz(true)}/>
          <main className="flex-1 min-h-0 flex flex-col lg:flex-row gap-3 px-3 md:px-4 py-3 overflow-y-auto lg:overflow-hidden">
            <LeftPanel result={result} onQuiz={()=>setQuiz(true)}/>
            <div className="order-1 lg:order-2 flex-1 min-w-0 flex flex-col min-h-0"><RoadMap selected={selected} setSelected={setSelected} result={result} onNodeClick={setNode}/></div>
            <RightPanel selected={selected} result={result}/>
          </main>
          <NodeModal data={node} onClose={()=>setNode(null)}/>
          {quiz && <Questionnaire onClose={()=>setQuiz(false)} onComplete={onComplete}/>}
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
